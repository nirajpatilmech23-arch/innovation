<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAzkcg1wzQTo2B7vQdcahtHAM2YBPn9WSY",
  databaseURL: "planting-77ce1-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

const mapRef = ref(database, "plant/map");

onValue(mapRef, (snapshot) => {

  const data = snapshot.val() || {};
  const container = document.getElementById("mapContainer");
  container.innerHTML = "";

  let planted = 0;

  // 🔥 Get all positions sorted
  const positions = Object.keys(data)
    .map(Number)
    .sort((a, b) => a - b);

  positions.forEach(pos => {

    const span = document.createElement("span");
    span.className = "spot";

    if (data[pos] === 1) {
      span.innerHTML = "🌱";
      planted++;
    } else {
      span.innerHTML = "❌";
    }

    container.appendChild(span);
  });

  const totalSpots = positions.length;

  document.getElementById("plantedCount").innerText = planted;
  document.getElementById("emptyCount").innerText = totalSpots - planted;

});

</script>
