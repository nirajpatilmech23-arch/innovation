<!DOCTYPE html>
<html>
<head>
  <title>Plant Trigger Monitor</title>

  <style>
    body {
      text-align: center;
      font-family: Arial;
      background-color: #f4fff4;
    }

    #status {
      font-size: 100px;
      margin-top: 50px;
      transition: 0.3s ease;
    }
  </style>
</head>
<body>

<h2>🌱 Plant Trigger Monitor</h2>
<h3>Status:</h3>

<div id="status">❌</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAzkcg1wzQTo2B7vQdcahtHAM2YBPn9WSY",
  databaseURL: "planting-77ce1-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);
const triggerRef = ref(database, "plant/trigger");

let timeout;

onValue(triggerRef, (snapshot) => {

  if (snapshot.exists()) {

    // Show plant when triggered
    document.getElementById("status").innerHTML = "🌱";

    // Clear previous timer
    clearTimeout(timeout);

    // Start 2 second timer
    timeout = setTimeout(() => {
      document.getElementById("status").innerHTML = "❌";
    }, 2000);
  }

});

</script>

</body>
</html>
