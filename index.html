<!DOCTYPE html>
<html>
<head>
  <title>Plantation Dashboard</title>

  <style>
    body {
      text-align: center;
      font-family: Arial;
      background-color: #f4fff4;
    }

    /* Grid layout for real field look */
    #mapContainer {
      margin-top: 40px;
      display: grid;
      grid-template-columns: repeat(auto-fill, 60px);
      gap: 12px;
      justify-content: center;
    }

    .spot {
      font-size: 40px;
    }
  </style>
</head>
<body>

<h2>🌾 Plantation Monitoring</h2>

<h3>Total Planted: <span id="plantedCount">0</span></h3>
<h3>Total Empty: <span id="emptyCount">0</span></h3>

<div id="mapContainer"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAzkcg1wzQTo2B7vQdcahtHAM2YBPn9WSY",
  databaseURL: "planting-77ce1-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

const mapRef = ref(database, "plant/map");

// 🔥 Continuous Mapping Logic
onValue(mapRef, (snapshot) => {

  const data = snapshot.val() || {};
  const container = document.getElementById("mapContainer");
  container.innerHTML = "";

  let planted = 0;

  // Get all mapped positions sorted
  const positions = Object.keys(data)
    .map(Number)
    .sort((a, b) => a - b);

  positions.forEach(pos => {

    const span = document.createElement("span");
    span.className = "spot";

    if (data[pos] === 1) {
      span.innerHTML = "🌱";
      planted++;
    } else {
      span.innerHTML = "❌";
    }

    container.appendChild(span);
  });

  const totalSpots = positions.length;

  document.getElementById("plantedCount").innerText = planted;
  document.getElementById("emptyCount").innerText = totalSpots - planted;

});

</script>

</body>
</html>
