<!DOCTYPE html>
<html>
<head>
  <title>Plant Growth</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

  <style>
    body {
      text-align: center;
      font-family: Arial;
    }

    #bubbleContainer {
      margin-top: 40px;
    }

    .bubble {
      width: 50px;
      height: 50px;
      background-color: green;
      border-radius: 50%;
      display: inline-block;
      margin: 10px;
      animation: pop 0.5s ease;
    }

    @keyframes pop {
      from { transform: scale(0); }
      to { transform: scale(1); }
    }
  </style>
</head>
<body>

<h2>🌱 Plant Growth Monitor</h2>

<div id="bubbleContainer"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAzkcg1wzQTo2B7vQdcahtHAM2YBPn9WSY",
  databaseURL: "planting-77ce1-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);
const plantRef = ref(database, "plant/count");

onValue(plantRef, (snapshot) => {
  const count = snapshot.val() || 0;
  const container = document.getElementById("bubbleContainer");
  container.innerHTML = "";

  for (let i = 0; i < count; i++) {
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    container.appendChild(bubble);
  }
});

</script>

</body>
</html>
