<!DOCTYPE html>
<html>

<head>

<title>Smart Plantation Monitoring</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4fff4;
margin:0;
}

/* WELCOME SCREEN */

#welcome{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

#tractor{
font-size:80px;
animation:move 4s infinite linear;
}

@keyframes move{
0%{transform:translateX(-200px)}
100%{transform:translateX(200px)}
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:8px;
background:green;
color:white;
cursor:pointer;
}

/* DASHBOARD */

#dashboard{
display:none;
padding:20px;
}

.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:20px;
}

.card{
background:white;
padding:20px;
width:160px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

#mapContainer{
margin-top:40px;
display:grid;
grid-template-columns:repeat(auto-fill,50px);
gap:10px;
justify-content:center;
}

.spot{
font-size:35px;
}

#tractorMap{
font-size:40px;
}

</style>

</head>

<body>

<!-- WELCOME SCREEN -->

<div id="welcome">

<h1>🚜 Smart Plantation System</h1>

<div id="tractor">🚜🌱🌱🌱</div>

<br>

<button onclick="startSystem()">Start Monitoring</button>

</div>

<!-- DASHBOARD -->

<div id="dashboard">

<h1>🌾 Plantation Dashboard</h1>

<div class="cards">

<div class="card">
<h3>🌱 Planted</h3>
<h2 id="planted">0</h2>
</div>

<div class="card">
<h3>❌ Missed</h3>
<h2 id="missed">0</h2>
</div>

<div class="card">
<h3>🚜 Speed</h3>
<h2 id="speed">0</h2>
</div>

<div class="card">
<h3>📏 Distance</h3>
<h2 id="distance">0</h2>
</div>

</div>

<h2>Plantation Map</h2>

<div id="mapContainer"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyAzkcg1wzQTo2B7vQdcahtHAM2YBPn9WSY",
databaseURL: "planting-77ce1-default-rtdb.asia-southeast1.firebasedatabase.app"

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* START BUTTON */

window.startSystem = function(){

document.getElementById("welcome").style.display="none";
document.getElementById("dashboard").style.display="block";

}

/* COUNT */

onValue(ref(db,"plant/count"),(snap)=>{
document.getElementById("planted").innerText=snap.val()||0;
});

/* MISSED */

onValue(ref(db,"plant/missed"),(snap)=>{
document.getElementById("missed").innerText=snap.val()||0;
});

/* SPEED */

onValue(ref(db,"plant/speed"),(snap)=>{
document.getElementById("speed").innerText=snap.val()||0;
});

/* DISTANCE */

onValue(ref(db,"plant/distance"),(snap)=>{
document.getElementById("distance").innerText=snap.val()||0;
});

/* MAP + TRACTOR */

onValue(ref(db,"plant/map"),(snapshot)=>{

const data=snapshot.val()||{};
const container=document.getElementById("mapContainer");

container.innerHTML="";

const positions=Object.keys(data)
.map(Number)
.sort((a,b)=>a-b);

positions.forEach((pos,index)=>{

const span=document.createElement("span");
span.className="spot";

if(data[pos]==1){
span.innerHTML="🌱";
}
else{
span.innerHTML="❌";
}

container.appendChild(span);

});

/* ADD TRACTOR AT END */

const tractor=document.createElement("span");
tractor.id="tractorMap";
tractor.innerHTML="🚜";

container.appendChild(tractor);

});

</script>

</body>
</html>
